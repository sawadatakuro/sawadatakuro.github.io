<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="theme-color" content="#EDE8DF">
<title>Takuro Sawada</title>
<style>
:root{
  color-scheme: light only;
  --paper:#EDE8DF;
  --ink:#2C241C;
  --terra:#C18055;
  --terra-deep:#7E4E2F;
  --umber:#271812;
  --stone:#8B7B64;
  --halo:#C8A889;
  --pad-x:20px;
  --serif:'Hiragino Mincho ProN','Yu Mincho','Georgia','Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Yu Gothic','Helvetica Neue',Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;background:var(--paper)}
@media (prefers-reduced-motion: reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.85;letter-spacing:.01em;-webkit-font-smoothing:antialiased;min-height:100vh}
img{max-width:100%;height:auto;display:block}
figure.full img,figure.half img,.grid2 img,.plan-wrap img,.stack figure img{width:100%}
.wrap{max-width:1180px;margin:0 auto;padding:0 var(--pad-x)}

/* ——— twin hairlines ——— */
.rail{border:none;height:5px;background:
  linear-gradient(var(--umber),var(--umber)) top/100% 1px no-repeat,
  linear-gradient(var(--umber),var(--umber)) bottom/100% 1px no-repeat}
.rail.terra{background:
  linear-gradient(var(--terra-deep),var(--terra-deep)) top/100% 1px no-repeat,
  linear-gradient(var(--terra-deep),var(--terra-deep)) bottom/100% 1px no-repeat}

/* ——— header ——— */
header{position:sticky;top:0;z-index:50;background:rgba(237,232,223,.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(44,36,28,.14)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;height:56px;gap:14px}
.brand{font-family:var(--serif);font-size:15px;letter-spacing:.1em;line-height:1;cursor:pointer;color:var(--ink);text-decoration:none;font-weight:600;white-space:nowrap;background:none;border:none}
nav{display:flex;align-items:center;gap:14px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap}
nav a,nav button{color:var(--ink);text-decoration:none;opacity:.75;cursor:pointer;line-height:1;padding:0 0 2px;background:none;border:none;border-bottom:1px solid transparent;font-family:var(--sans);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase}
nav a:hover,nav button:hover,nav a:focus-visible{opacity:1;border-bottom-color:var(--terra-deep);outline:none}
@media(min-width:620px){ .brand{font-size:17px;letter-spacing:.14em} nav{gap:22px;font-size:11.5px} nav a,nav button{font-size:11.5px} .hdr-in{height:66px} :root{--pad-x:32px} }
@media(min-width:960px){ :root{--pad-x:44px} .hdr-in{height:74px} }

.hdr-right{display:flex;align-items:center;gap:14px}
.lang-switch{display:flex;align-items:center;gap:5px;padding-left:14px;border-left:1px solid rgba(44,36,28,.16)}
.lang-switch button{background:none;border:none;cursor:pointer;padding:0;color:var(--ink);opacity:.45;font-family:var(--sans);font-size:10.5px;letter-spacing:.1em;line-height:1}
.lang-switch button.active{opacity:1;color:var(--terra-deep);font-weight:600}
.lang-switch button:hover{opacity:1}
.lang-switch .lang-sep{opacity:.3;font-size:10px;color:var(--ink)}
@media(min-width:620px){ .hdr-right{gap:22px} .lang-switch button{font-size:11.5px} }

.view{display:none}
.view.active{display:block}

/* ——— HERO ——— */
.hero{position:relative;height:calc(100vh - 56px);min-height:460px;overflow:hidden;background:#000}
@media(min-width:620px){.hero{height:calc(100vh - 66px)}}
@media(min-width:960px){.hero{height:calc(100vh - 74px)}}
.hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.82)}
.hero .hero-txt{position:absolute;left:0;right:0;bottom:0;padding:0 var(--pad-x) 8vh;color:#fff}
.hero h1{font-family:var(--serif);font-weight:500;font-size:clamp(24px,4.6vw,44px);letter-spacing:.04em;line-height:1.32;max-width:15em;text-shadow:0 1px 24px rgba(0,0,0,.35)}
.scroll-cue{position:absolute;left:50%;bottom:22px;transform:translateX(-50%);color:rgba(255,255,255,.8);font-size:10px;letter-spacing:.28em;text-transform:uppercase;animation:bob 2.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}

/* ——— index works ——— */
.idx-body{padding:60px 0 0}
.works-label{margin:0 0 16px;font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--terra-deep)}
.work-card{display:block;cursor:pointer;text-decoration:none;color:inherit;margin-bottom:70px;background:none;border:none;width:100%;text-align:left;font-family:inherit}
.work-card figure{overflow:hidden;background:#00000008}
.work-card img{width:100%;transition:transform 1.2s ease}
.work-card:hover img{transform:scale(1.015)}
.work-meta{display:flex;justify-content:space-between;align-items:baseline;padding:14px 2px 0;flex-wrap:wrap;gap:6px 14px}
.work-meta h2{font-family:var(--serif);font-weight:500;font-size:21px;letter-spacing:.04em}
.work-meta .tag{font-size:11px;letter-spacing:.14em;color:var(--stone);text-transform:uppercase}
@media(min-width:620px){ .idx-body{padding:80px 0 0} .work-card{margin-bottom:100px} .work-meta h2{font-size:25px} }

.about{padding:52px 0 60px;max-width:620px}
.about h3{font-family:var(--serif);font-weight:500;font-size:18px;letter-spacing:.1em;margin-bottom:16px}
.about p{font-size:13.5px}

footer{padding:34px 0 50px}
.foot-in{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-top:18px;font-size:11px;letter-spacing:.1em;color:var(--stone)}
footer a{color:var(--terra-deep);text-decoration:none}
footer a:hover{border-bottom:1px solid var(--terra-deep)}

/* ——— project ——— */
.pj-head{padding:44px 0 28px}
.pj-head .eyebrow{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--terra-deep)}
.pj-head h1{font-family:var(--serif);font-weight:500;font-size:clamp(28px,7vw,50px);letter-spacing:.04em;line-height:1.3;margin-top:8px}
.pj-head .sub{display:block;margin-top:8px;font-family:var(--serif);color:var(--stone);font-size:14px;letter-spacing:.06em}
.backlink{background:none;border:none;font-family:var(--sans);color:var(--stone);cursor:pointer;font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:0}
.backlink:hover{color:var(--terra-deep)}

figure.full{margin:28px 0 0}
figcaption{padding:9px 2px 0;font-size:11px;letter-spacing:.03em;color:var(--stone);line-height:1.7}
.pj-body{display:grid;grid-template-columns:1fr;gap:34px;padding:46px 0;max-width:720px}
.pj-body .en{font-size:14px}
.pj-body .ja{font-size:13px;line-height:2.1}
.pj-body p+p{margin-top:1.2em}
.pj-body .lede{font-family:var(--serif);font-size:18px;line-height:1.85;letter-spacing:.02em;margin-bottom:1.3em}
.grid2{display:grid;grid-template-columns:1fr;gap:30px;margin:34px 0}
.stack figure+figure{margin-top:30px}
section.chapter{padding:20px 0 4px}
.chapter .ch-label{display:flex;align-items:baseline;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.chapter .ch-label .no{font-family:var(--serif);color:var(--terra-deep);font-size:12px;letter-spacing:.16em}
.chapter .ch-label h3{font-family:var(--serif);font-weight:500;font-size:17px;letter-spacing:.08em}
.plan-wrap{background:#F4F1EA;padding:16px;margin:18px 0}
.credits{padding:48px 0 26px;display:grid;grid-template-columns:1fr;gap:24px}
.credits dl{font-size:12.5px}
.credits dt{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--terra-deep);margin-top:13px}
.credits dt:first-child{margin-top:0}
.credits dd{margin:2px 0 0}
.featured em{font-family:var(--serif);font-style:normal;color:var(--ink)}
@media(min-width:620px){
  .pj-head{padding:70px 0 34px}
  .pj-head .sub{font-size:16px}
  figure.full{margin:34px 0 0}
  .pj-body{padding:56px 0;gap:44px}
  .pj-body .lede{font-size:19px}
  .grid2{gap:40px;margin:40px 0}
  .stack figure+figure{margin-top:40px}
  .chapter .ch-label h3{font-size:19px}
  .plan-wrap{padding:clamp(16px,4vw,44px);margin:20px 0}
}
@media(min-width:760px){ .grid2{grid-template-columns:1fr 1fr} .credits{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>

<header>
  <div class="wrap hdr-in">
    <button class="brand" onclick="showIndex()"></button>
    <div class="hdr-right">
      <nav>
        <button onclick="showIndex()">Works</button>
        <button onclick="showIndex(true)">About</button>
        <a id="nav-contact" href="#">Contact</a>
      </nav>
      <div class="lang-switch" role="group" aria-label="Language">
        <button id="lang-ja" type="button" onclick="setLang('ja')">JA</button>
        <span class="lang-sep">/</span>
        <button id="lang-en" type="button" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</header>

<!-- INDEX -->
<main class="view active" id="view-index">
  <section class="hero" id="hero">
    <img id="hero-img" alt="">
    <div class="hero-txt">
      <h1 id="hero-h1"></h1>
    </div>
    <div class="scroll-cue">Scroll</div>
  </section>

  <div class="wrap idx-body">
    <div class="works-label">Works</div>
    <div id="works-list"></div>
  </div>
  <hr class="rail terra">
  <div class="wrap">
    <div class="about" id="about">
      <h3>About</h3>
      <p id="about-text"></p>
    </div>
  </div>
  <footer><div class="wrap"><div class="foot-in">
    <span id="foot-copy"></span>
    <span id="foot-links"></span>
  </div></div></footer>
</main>

<!-- PROJECT -->
<main class="view" id="view-project">
  <div class="wrap">
    <div class="pj-head">
      <button class="backlink" onclick="showIndex()">← Works</button>
      <div class="eyebrow" id="pj-eyebrow" style="margin-top:14px"></div>
      <h1 id="pj-title"></h1>
      <span class="sub" id="pj-sub"></span>
    </div>
  </div>
  <hr class="rail">
  <div class="wrap" id="pj-content"></div>
</main>

<script src="data.js"></script>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ——— language ——— */
var LANG = 'ja';
try{ var savedLang = localStorage.getItem('sawada-lang'); if(savedLang==='en'||savedLang==='ja') LANG = savedLang; }catch(e){}
var currentWorkIndex = null;
var ROLE_JA = {
  'Design':'設計','Photography':'写真','Plasterwork — walls':'左官（壁）','Plasterwork — ceiling':'左官（天井）',
  'Location':'所在地','Floor area':'延床面積','Completion':'竣工','Featured in':'掲載'
};

function setLang(l){
  LANG = l;
  try{ localStorage.setItem('sawada-lang', l); }catch(e){}
  document.documentElement.lang = l;
  updateLangUI();
  buildIndex();
  if(currentWorkIndex!==null && document.getElementById('view-project').classList.contains('active')){
    buildProject(WORKS[currentWorkIndex]);
  }
}
function updateLangUI(){
  document.getElementById('lang-ja').classList.toggle('active', LANG==='ja');
  document.getElementById('lang-en').classList.toggle('active', LANG==='en');
}

/* ——— build index ——— */
function buildIndex(){
  document.querySelector('.brand').textContent = LANG==='ja' ? SITE.nameJa : SITE.name;
  document.getElementById('hero-img').src = SITE.heroImage;
  document.getElementById('hero-h1').textContent = LANG==='ja' ? SITE.heroHeadingJa : SITE.heroHeadingEn;
  document.getElementById('about-text').textContent = LANG==='ja' ? SITE.aboutJa : SITE.aboutEn;
  document.getElementById('nav-contact').href = 'mailto:'+SITE.email;
  document.getElementById('foot-copy').textContent = '© '+(LANG==='ja' ? SITE.nameJa : SITE.name.replace(/\b\w/g,c=>c.toUpperCase()));
  document.getElementById('foot-links').innerHTML =
    '<a href="mailto:'+esc(SITE.email)+'">'+esc(SITE.email)+'</a> · <a href="'+esc(SITE.instagram)+'">Instagram</a>';

  var html = WORKS.map(function(w,i){
    var title = LANG==='ja' ? w.titleJa : w.title;
    return '<button class="work-card" onclick="showProject('+i+')">'+
      '<figure><img src="'+esc(w.cover)+'" alt="'+esc(title)+'"></figure>'+
      '<div class="work-meta"><h2>'+esc(title)+'</h2>'+
      '<span class="tag">'+esc(w.location.split(',').slice(-2).join(',').trim())+' · '+esc(w.year)+'</span></div></button>';
  }).join('');
  document.getElementById('works-list').innerHTML = html;
}

/* ——— build a project ——— */
function chapterHTML(ch){
  var imgs = ch.images.map(function(im){
    var capText = LANG==='ja' ? im.capJa : im.capEn;
    var cap = '<figcaption>'+esc(capText)+'</figcaption>';
    return {wide:!!im.wide, html:'<figure class="'+(im.wide?'full':'half')+'"><img src="'+esc(im.src)+'" alt="'+esc(capText)+'">'+cap+'</figure>'};
  });
  var chTitle = LANG==='ja' ? ch.titleJa : ch.title;
  var out = '<section class="chapter"><div class="ch-label"><span class="no">'+esc(ch.no)+'</span><h3>'+esc(chTitle)+'</h3></div>';
  // wide images go full; consecutive non-wide get paired into grid2
  var buffer=[];
  function flush(){ if(buffer.length){ out+='<div class="grid2">'+buffer.join('')+'</div>'; buffer=[]; } }
  imgs.forEach(function(o){
    if(o.wide){ flush(); out+=o.html; }
    else { buffer.push(o.html); if(buffer.length===2) flush(); }
  });
  flush();
  return out+'</section>';
}

function buildProject(w){
  var eyebrowLead = LANG==='ja' ? '作品 — 改修, ' : 'Works — Renovation, ';
  document.getElementById('pj-eyebrow').textContent = eyebrowLead+w.location+', '+w.year;
  document.getElementById('pj-title').textContent = LANG==='ja' ? w.titleJa : w.title;
  document.getElementById('pj-sub').textContent = LANG==='ja' ? (w.subtitleJa||'') : '';

  var c = document.getElementById('pj-content');
  var lede = '<figure class="full"><img src="'+esc(w.chapters[1]?w.chapters[1].images[0].src:w.cover)+'" alt=""></figure>';
  var bodyParas = LANG==='ja' ? w.bodyJa : w.bodyEn;
  var body = '<div class="pj-body"><div class="'+(LANG==='ja'?'ja':'en')+'">'+
      bodyParas.map(function(p,i){return '<p'+(i===0?' class="lede"':'')+'>'+esc(p)+'</p>';}).join('')+
    '</div></div>';

  var chapters = w.chapters.map(function(ch,i){
    return (i>0?'<hr class="rail terra">':'')+chapterHTML(ch);
  }).join('');

  var drawingsLabel = LANG==='ja' ? '図面' : 'Drawings';
  var plan = w.planImage ? '<hr class="rail"><section class="chapter"><div class="ch-label"><span class="no">—</span><h3>'+drawingsLabel+'</h3></div><div class="plan-wrap"><img src="'+esc(w.planImage)+'" alt="Floor plan"></div></section>' : '';

  var half = Math.ceil(w.credits.length/2);
  function dl(list){ return '<dl>'+list.map(function(cr){
    var roleLabel = LANG==='ja' ? (ROLE_JA[cr.role]||cr.role) : cr.role;
    var v = cr.role==='Featured in' ? '<span class="featured"><em>'+esc(cr.value)+'</em></span>' : esc(cr.value);
    return '<dt>'+esc(roleLabel)+'</dt><dd>'+v+'</dd>';
  }).join('')+'</dl>'; }
  var credits = '<div class="credits">'+dl(w.credits.slice(0,half))+dl(w.credits.slice(half))+'</div><hr class="rail">';

  c.innerHTML = lede + body + chapters + plan + credits;
}

/* ——— navigation ——— */
function showIndex(scrollAbout){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-index').classList.add('active');
  if(scrollAbout){ setTimeout(()=>document.getElementById('about').scrollIntoView({behavior:'smooth'}),40); }
  else window.scrollTo({top:0,behavior:'instant'});
}
function showProject(i){
  currentWorkIndex = i;
  buildProject(WORKS[i]);
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('active'));
  document.getElementById('view-project').classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}
document.documentElement.lang = LANG;
updateLangUI();
buildIndex();
</script>
</body>
</html>
